apiVersion: app/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    specs:
      containers:
        - name: nginx
      image: nginx:1.42.2
      ports:
        - containerPort: 80
